name: Publish wiki
on:
  push:
    branches: [main]
    paths:
      - github_docs/**
      - .github/workflows/github-wiki.yml
concurrency:
  group: publish-wiki
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: github_docs
          disable-empty-commits: true
