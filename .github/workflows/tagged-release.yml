name: Tagged Release Build

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Build JAR and copy runtime dependencies
        shell: pwsh
        run: |
          .\mvnw.cmd -B -DskipTests package dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/dist-libs
          Copy-Item target/praktiKST-1.0-SNAPSHOT.jar target/dist-libs/

      - name: Build EXE with jpackage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          jpackage --type exe --name praktiKST --input target/dist-libs --main-jar praktiKST-1.0-SNAPSHOT.jar --main-class kst4contest.view.Kst4ContestApplication --module-path target/dist-libs --add-modules javafx.controls,javafx.graphics,javafx.fxml,javafx.web,javafx.media,java.sql --dest dist

          $exe = Get-ChildItem -Path dist -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            throw "No EXE produced by jpackage"
          }
          Move-Item -Path $exe.FullName -Destination dist/praktiKST-windows-x64.exe -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/praktiKST-windows-x64.exe

  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Ensure mvnw is executable
        run: chmod +x mvnw

      - name: Build JAR and copy runtime dependencies
        run: |
          ./mvnw -B -DskipTests package dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/dist-libs
          cp target/praktiKST-1.0-SNAPSHOT.jar target/dist-libs/

      - name: Build app-image with jpackage
        run: |
          mkdir -p dist
          jpackage \
            --type app-image \
            --name praktiKST \
            --input target/dist-libs \
            --main-jar praktiKST-1.0-SNAPSHOT.jar \
            --main-class kst4contest.view.Kst4ContestApplication \
            --module-path target/dist-libs \
            --add-modules javafx.controls,javafx.graphics,javafx.fxml,javafx.web,javafx.media,java.sql \
            --dest dist

      - name: Create AppDir metadata
        run: |
          rm -rf target/praktiKST.AppDir
          cp -a dist/praktiKST target/praktiKST.AppDir

          cat > target/praktiKST.AppDir/AppRun << 'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/bin/praktiKST" "$@"
          EOF
          chmod +x target/praktiKST.AppDir/AppRun

          cat > target/praktiKST.AppDir/praktiKST.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=praktiKST
          Exec=praktiKST
          Icon=praktiKST
          Categories=Network;HamRadio;
          Terminal=false
          EOF

          if [ -f target/praktiKST.AppDir/lib/praktiKST.png ]; then
            cp target/praktiKST.AppDir/lib/praktiKST.png target/praktiKST.AppDir/praktiKST.png
          fi

      - name: Build AppImage
        run: |
          wget -q -O target/appimagetool.AppImage https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x target/appimagetool.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 target/appimagetool.AppImage target/praktiKST.AppDir dist/praktiKST-linux-x86_64.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/praktiKST-linux-x86_64.AppImage

  release-tag:
    name: Publish Tagged Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-exe
      - build-linux-appimage

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-assets/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: release-assets/linux

      - name: Create tagged release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          allowUpdates: false
          replacesArtifacts: false
          makeLatest: true
          generateReleaseNotes: true
          artifacts: release-assets/windows/praktiKST-windows-x64.exe,release-assets/linux/praktiKST-linux-x86_64.AppImage
